esphome:
  name: inky-test

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: INFO

# SPI Bus Configuration
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# Pull the component from the GitHub repository
external_components:
  - source:
      type: git
      url: https://github.com/Tiki-God/inky
      ref: master
    components: [ inky_impression_4 ]

# Google Font for display testing
font:
  - file: "gfont://Roboto"
    id: font_roboto
    size: 24

# Configuration for the custom Inky Impression 4 display
display:
  - platform: inky_impression_4
    id: my_display
    cs_pin: GPIO14
    dc_pin: GPIO22
    reset_pin: GPIO21
    busy_pin: GPIO17
    border_color: orange
    update_interval: 60s
    lambda: |-
      // Clear screen (White)
      it.fill(Color(255, 255, 255));
      
      // Draw display title
      it.print(10, 10, id(font_roboto), Color(57, 48, 57), "Inky Impression 4 ESPHome Test");
      
      // Draw rectangles for all 7 supported colors
      it.filled_rectangle(10, 80, 50, 50, Color(57, 48, 57));     // Black
      it.filled_rectangle(70, 80, 50, 50, Color(255, 255, 255));  // White (with a black border)
      it.rectangle(70, 80, 50, 50, Color(57, 48, 57));
      it.filled_rectangle(130, 80, 50, 50, Color(58, 91, 70));    // Green
      it.filled_rectangle(190, 80, 50, 50, Color(61, 59, 94));    // Blue
      it.filled_rectangle(250, 80, 50, 50, Color(156, 72, 75));   // Red
      it.filled_rectangle(310, 80, 50, 50, Color(208, 190, 71));  // Yellow
      it.filled_rectangle(370, 80, 50, 50, Color(177, 106, 73));  // Orange
